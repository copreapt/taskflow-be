name: CI/CD

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]

jobs:
    ci:
        name: Lint, Type Check & Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run linter
              run: npm run lint

            - name: Run type check
              run: npx tsc --noEmit

            - name: Build
              run: npm run build

    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        needs: ci
        if: github.ref == 'refs/heads/staging'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: copreapt/taskflow-backend:staging

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      cd ~/taskflow
                      docker pull copreapt/taskflow-backend:staging
                      docker-compose -f docker-compose.backend.yml up -d

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: ci
        if: github.ref == 'refs/heads/main'
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: copreapt/taskflow-backend:production

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.EC2_PROD_HOST }}
                  username: ${{ secrets.EC2_PROD_USER }}
                  key: ${{ secrets.EC2_PROD_SSH_KEY }}
                  script: |
                      cd ~/taskflow
                      docker pull copreapt/taskflow-backend:production
                      docker-compose -f docker-compose.backend.yml up -d
